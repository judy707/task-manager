services:
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: taskuser
      POSTGRES_PASSWORD: taskpass
      POSTGRES_DB: taskdb
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  api:
    build: .
    restart: on-failure
    depends_on:
      - db
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://taskuser:taskpass@db:5432/taskdb
      PORT: 3000
    command: sh -c "npx prisma db push --skip-generate && node server.js"

volumes:
  pgdata: